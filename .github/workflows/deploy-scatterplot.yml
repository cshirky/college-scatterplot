name: Deploy Scatterplot to college-scatterplot

on:
  push:
    branches: [Scatterplot]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx observable build
      - name: Deploy to college-scatterplot gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.SCATERPLOT_DEPLOY_TOKEN }}
          external_repository: cshirky/college-scatterplot
          publish_branch: gh-pages
          publish_dir: dist
